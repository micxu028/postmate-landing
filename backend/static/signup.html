<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — PostMate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
    <nav class="app-nav">
        <a href="/" class="logo">PostMate</a>
        <a href="/app/login.html" style="font-size:14px;color:var(--accent);text-decoration:none;font-weight:600">Sign In</a>
    </nav>
    <div class="container">
        <div class="card">
            <h1>Get Started</h1>
            <p>Create your account — it takes 30 seconds.</p>
            <form id="signup-form">
                <div class="form-group">
                    <label>Email address</label>
                    <input type="email" id="email" placeholder="you@studio.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="At least 8 characters" minlength="8" required autocomplete="new-password">
                    <div class="hint">At least 8 characters</div>
                </div>
                <button type="submit" class="btn btn-primary" id="submit-btn">Create Account →</button>
                <p style="text-align:center;margin-top:16px;font-size:13px;color:var(--muted)">
                    Already have an account? <a href="/app/login.html" style="color:var(--accent)">Sign in</a>
                </p>
            </form>
        </div>
    </div>
    <script src="/static/js/api.js"></script>
    <script>
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true; btn.textContent = 'Creating account...';
            try {
                const data = await API.register(
                    document.getElementById('email').value,
                    document.getElementById('password').value
                );
                localStorage.setItem('token', data.token);
                window.location.href = '/app/onboarding.html';
            } catch (err) {
                alert(err.message);
                btn.disabled = false; btn.textContent = 'Create Account →';
            }
        });
    </script>
</body>
</html>
