<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — PostMate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
    <nav class="app-nav">
        <a href="/" class="logo">PostMate</a>
        <a href="/app/signup.html" style="font-size:14px;color:var(--accent);text-decoration:none;font-weight:600">Sign Up</a>
    </nav>
    <div class="container">
        <div class="card">
            <h1>Welcome back</h1>
            <p>Sign in to your dashboard.</p>
            <form id="login-form">
                <div class="form-group">
                    <label>Email address</label>
                    <input type="email" id="email" placeholder="you@studio.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary" id="submit-btn">Sign In →</button>
                <p style="text-align:center;margin-top:16px;font-size:13px;color:var(--muted)">
                    No account yet? <a href="/app/signup.html" style="color:var(--accent)">Create one</a>
                </p>
            </form>
        </div>
    </div>
    <script src="/static/js/api.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true; btn.textContent = 'Signing in...';
            try {
                const data = await API.login(
                    document.getElementById('email').value,
                    document.getElementById('password').value
                );
                localStorage.setItem('token', data.token);
                window.location.href = '/app/dashboard.html';
            } catch (err) {
                alert(err.message);
                btn.disabled = false; btn.textContent = 'Sign In →';
            }
        });
    </script>
</body>
</html>
